<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Collate Codex Plugin Mark</title>
  <desc id="desc">An editorial manuscript mark: folio grid, OCR scan bands, and red collation strokes over a dark archival field.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#171412"/>
      <stop offset="55%" stop-color="#231b17"/>
      <stop offset="100%" stop-color="#0f0d0c"/>
    </linearGradient>
    <linearGradient id="paper" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#efe4d1"/>
      <stop offset="100%" stop-color="#d8c3a6"/>
    </linearGradient>
    <linearGradient id="ink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d54d3f"/>
      <stop offset="100%" stop-color="#ff9c67"/>
    </linearGradient>
    <filter id="grain" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.95" numOctaves="2" seed="7" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.08"/>
      </feComponentTransfer>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
    <clipPath id="folioClip">
      <rect x="116" y="72" width="280" height="368" rx="18"/>
    </clipPath>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>
  <rect width="512" height="512" fill="#ffffff" opacity="0.03" filter="url(#grain)"/>

  <g opacity="0.22" stroke="#9f8a74" stroke-width="1">
    <path d="M48 118H464"/>
    <path d="M48 394H464"/>
    <path d="M118 48V464"/>
    <path d="M394 48V464"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="116" y="72" width="280" height="368" rx="18" fill="url(#paper)"/>
    <path d="M364 72V440C386 428 396 411 396 386V98C396 84 386 74 372 72Z" fill="#c8af90" opacity="0.7"/>
  </g>

  <g clip-path="url(#folioClip)">
    <rect x="136" y="102" width="240" height="308" fill="none" stroke="#7b6a59" stroke-width="1.5" opacity="0.45"/>

    <g stroke="#5f5145" stroke-width="1.2" opacity="0.45">
      <path d="M154 136H358"/>
      <path d="M154 174H358"/>
      <path d="M154 212H358"/>
      <path d="M154 250H358"/>
      <path d="M154 288H358"/>
      <path d="M154 326H358"/>
      <path d="M154 364H358"/>
      <path d="M154 402H322"/>
    </g>

    <g fill="#312923" opacity="0.18">
      <rect x="154" y="126" width="124" height="14" rx="4"/>
      <rect x="154" y="164" width="166" height="14" rx="4"/>
      <rect x="154" y="202" width="150" height="14" rx="4"/>
      <rect x="154" y="240" width="182" height="14" rx="4"/>
      <rect x="154" y="278" width="136" height="14" rx="4"/>
      <rect x="154" y="316" width="170" height="14" rx="4"/>
      <rect x="154" y="354" width="146" height="14" rx="4"/>
      <rect x="154" y="392" width="108" height="14" rx="4"/>
    </g>

    <g stroke="#d7c3ab" stroke-width="8" opacity="0.14">
      <path d="M136 112L376 112"/>
      <path d="M136 156L376 156"/>
      <path d="M136 200L376 200"/>
      <path d="M136 244L376 244"/>
      <path d="M136 288L376 288"/>
      <path d="M136 332L376 332"/>
      <path d="M136 376L376 376"/>
    </g>

    <g fill="none" stroke="url(#ink)" stroke-linecap="round" stroke-linejoin="round">
      <path d="M336 126C352 142 356 164 346 188C336 214 314 232 280 240" stroke-width="14"/>
      <path d="M240 236L284 240L272 282" stroke-width="14"/>
      <path d="M176 320C190 300 208 289 230 288C262 286 286 304 302 342" stroke-width="12"/>
      <path d="M328 146L356 118" stroke-width="9"/>
      <path d="M152 94L360 94" stroke="#b14a39" stroke-width="5" opacity="0.55"/>
      <path d="M170 350L212 392" stroke-width="10" opacity="0.95"/>
      <path d="M212 350L170 392" stroke-width="10" opacity="0.95"/>
    </g>

    <g fill="#8e7861" opacity="0.46">
      <circle cx="346" cy="392" r="5"/>
      <circle cx="330" cy="392" r="5"/>
      <circle cx="314" cy="392" r="5"/>
    </g>
  </g>

  <g fill="#f0dfc7" opacity="0.78">
    <path d="M88 92h18v18H88z"/>
    <path d="M406 402h18v18h-18z"/>
  </g>
</svg>
