<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" role="img" aria-labelledby="title desc">
  <title id="title">collate · prometheus card</title>
  <desc id="desc">Terminal-style display of a prometheus-rendered concept card for 三司, with genus, differentia, plain gloss, era, and essential distinctions printed line by line.</desc>

  <defs>
    <style>
      .frame  { fill: #0d1117; }
      .border { stroke: #21262d; fill: none; }
      .dot-r  { fill: #ff5f56; }
      .dot-y  { fill: #ffbd2e; }
      .dot-g  { fill: #27c93f; }
      .meta   { font: 11px ui-monospace,'IBM Plex Mono','SF Mono',Menlo,Consolas,monospace; fill: #6e7681; letter-spacing: 0.06em; }
      .prompt { font: 600 14px ui-monospace,'IBM Plex Mono','SF Mono',Menlo,Consolas,monospace; fill: #a371f7; }
      .cmd    { font: 14px ui-monospace,'IBM Plex Mono','SF Mono',Menlo,Consolas,monospace; fill: #c9d1d9; }
      .hanzi  { font: 600 64px 'Songti SC','Source Han Serif SC','Noto Serif SC',serif; fill: #f0f6fc; letter-spacing: 0.04em; }
      .latin  { font: 300 14px 'EB Garamond',Georgia,serif; font-style: italic; fill: #8b949e; letter-spacing: 0.06em; }
      .field  { font: 600 11px ui-monospace,'IBM Plex Mono',Menlo,monospace; fill: #79c0ff; letter-spacing: 0.32em; }
      .value  { font: 14px ui-monospace,'IBM Plex Mono','SF Mono',Menlo,Consolas,monospace; fill: #c9d1d9; }
      .value-zh { font: 14px 'Songti SC','Source Han Serif SC','Noto Serif SC',serif; fill: #c9d1d9; letter-spacing: 0.04em; }
      .tick   { fill: #21262d; }
      .accent-line { stroke: #a371f7; stroke-width: 1.5; }
    </style>
  </defs>

  <rect class="frame" width="1200" height="480" rx="10"/>
  <rect class="border" x="0.5" y="0.5" width="1199" height="479" rx="10"/>

  <!-- title bar -->
  <circle class="dot-r" cx="22" cy="24" r="6"/>
  <circle class="dot-y" cx="42" cy="24" r="6"/>
  <circle class="dot-g" cx="62" cy="24" r="6"/>
  <text class="meta" x="600" y="28" text-anchor="middle">collate ⋅ prometheus ⋅ analysis/prometheus/三司.svg</text>

  <line x1="0" y1="48" x2="1200" y2="48" stroke="#21262d"/>

  <!-- prompt + command -->
  <text class="prompt" x="40" y="84">&gt;</text>
  <text class="cmd"    x="60" y="84">/collate:prometheus 三司</text>
  <text class="meta"   x="40" y="106">one concept · one signal · achromatic discipline</text>

  <!-- card composition -->
  <!-- left: hanzi title with vertical accent line -->
  <line x1="64" y1="160" x2="64" y2="320" class="accent-line"/>

  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.2s" dur="0.5s" fill="freeze"/>
    <text class="hanzi" x="92" y="220">三司</text>
    <text class="latin" x="92" y="252">sān sī · the Three Bureaus</text>
  </g>

  <!-- field grid -->
  <!-- GENUS -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.7s" dur="0.4s" fill="freeze"/>
    <text class="field" x="92"  y="294">GENUS</text>
    <text class="value-zh" x="92" y="316">中央财政机构 · 北宋官制中的最高经济中枢</text>
  </g>

  <!-- right column: temporal + distinctions -->
  <!-- YEARS -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.2s" dur="0.4s" fill="freeze"/>
    <text class="field" x="640" y="160">YEARS</text>
    <text class="value" x="640" y="182">964 — 1080</text>
    <text class="meta"  x="640" y="200" fill="#6e7681">乾德二年至元丰三年 · 元丰改制后并入户部</text>
  </g>

  <!-- DIFFERENTIA -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.7s" dur="0.4s" fill="freeze"/>
    <text class="field" x="640" y="234">DIFFERENTIA</text>
    <text class="value-zh" x="640" y="256">盐铁 · 度支 · 户部 三署合署</text>
    <text class="meta"  x="640" y="276" fill="#6e7681">职能上脱离尚书省 · 直辖于皇帝</text>
  </g>

  <!-- DO NOT CONFUSE -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="2.2s" dur="0.4s" fill="freeze"/>
    <text class="field" x="640" y="310">≠</text>
    <text class="value-zh" x="664" y="310">唐代御史台「三司」会审制度</text>
    <text class="meta"  x="640" y="328" fill="#6e7681">同名异指 · 不混淆司法三司与财政三司</text>
  </g>

  <!-- CORE -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="2.7s" dur="0.4s" fill="freeze"/>
    <text class="field" x="92"  y="350">CORE</text>
    <text class="value-zh" x="92" y="372">财权独立于相权 · 北宋集权特征的制度化体现</text>
  </g>

  <!-- bottom rule + meta -->
  <line x1="40" y1="408" x2="1160" y2="408" stroke="#21262d"/>
  <text class="meta" x="40"   y="436">source · workspace/final.md L228 — L264</text>
  <text class="meta" x="500"  y="436">ATTRIBUTION-style render · 1 concept = 1 signal</text>
  <text class="meta" x="1160" y="436" text-anchor="end">analysis/prometheus/三司.svg</text>
  <text class="meta" x="40"   y="458" fill="#484f58">card is a definition made visible · not a poster full of effects</text>

  <!-- subtle pulsing dot near concept (the spark) -->
  <circle cx="64" cy="160" r="3" fill="#a371f7">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2.4s" repeatCount="indefinite"/>
  </circle>
</svg>
