<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" role="img" aria-labelledby="title desc">
  <title id="title">collate · proofread review</title>
  <desc id="desc">Terminal-style listing of A/B/C review entries produced by collate proofread on a Republican-era Chinese text, with severity colors and per-line evidence.</desc>

  <defs>
    <style>
      .frame  { fill: #0d1117; }
      .border { stroke: #21262d; fill: none; }
      .dot-r  { fill: #ff5f56; }
      .dot-y  { fill: #ffbd2e; }
      .dot-g  { fill: #27c93f; }
      .meta   { font: 11px ui-monospace,'IBM Plex Mono','SF Mono',Menlo,Consolas,monospace; fill: #6e7681; letter-spacing: 0.06em; }
      .prompt { font: 600 14px ui-monospace,'IBM Plex Mono','SF Mono',Menlo,Consolas,monospace; fill: #a371f7; }
      .cmd    { font: 14px ui-monospace,'IBM Plex Mono','SF Mono',Menlo,Consolas,monospace; fill: #c9d1d9; }
      .head   { font: 600 12px ui-monospace,'IBM Plex Mono',Menlo,monospace; fill: #6e7681; letter-spacing: 0.18em; }
      .ln     { font: 13px ui-monospace,'IBM Plex Mono',Menlo,monospace; fill: #6e7681; }
      .body   { font: 13px ui-monospace,'IBM Plex Mono',Menlo,monospace; fill: #c9d1d9; }
      .note   { font: 12px ui-monospace,'IBM Plex Mono',Menlo,monospace; fill: #8b949e; }
      .arrow  { font: 13px ui-monospace,'IBM Plex Mono',Menlo,monospace; fill: #484f58; }
      .tag-A  { fill: #f85149; }
      .tag-B  { fill: #d29922; }
      .tag-C  { fill: #79c0ff; }
      .tag-text { font: 600 12px ui-monospace,'IBM Plex Mono',Menlo,monospace; fill: #0d1117; letter-spacing: 0.04em; }
      .summary  { font: 600 13px ui-monospace,'IBM Plex Mono',Menlo,monospace; fill: #c9d1d9; letter-spacing: 0.04em; }
      .summary-A { fill: #f85149; }
      .summary-B { fill: #d29922; }
      .summary-C { fill: #79c0ff; }
    </style>
  </defs>

  <rect class="frame" width="1200" height="480" rx="10"/>
  <rect class="border" x="0.5" y="0.5" width="1199" height="479" rx="10"/>

  <!-- title bar -->
  <circle class="dot-r" cx="22" cy="24" r="6"/>
  <circle class="dot-y" cx="42" cy="24" r="6"/>
  <circle class="dot-g" cx="62" cy="24" r="6"/>
  <text class="meta" x="600" y="28" text-anchor="middle">collate ⋅ proofread ⋅ raw.review.md</text>

  <line x1="0" y1="48" x2="1200" y2="48" stroke="#21262d"/>

  <!-- prompt + command -->
  <text class="prompt" x="40" y="84">&gt;</text>
  <text class="cmd"    x="60" y="84">/collate:proofread raw.md --type=republican</text>
  <text class="meta"   x="40" y="106">historical-proofreader engaged · 188 pages · five-step checklist</text>

  <!-- column header -->
  <text class="head" x="40"  y="146">类</text>
  <text class="head" x="78"  y="146">行</text>
  <text class="head" x="148" y="146">原文 / 建议</text>
  <text class="head" x="640" y="146">说明</text>

  <line x1="40" y1="156" x2="1160" y2="156" stroke="#21262d" stroke-dasharray="2 4"/>

  <!-- ROW 1 -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.2s" dur="0.4s" fill="freeze"/>
    <rect class="tag-A" x="40" y="172" width="22" height="20" rx="3"/>
    <text class="tag-text" x="51" y="187" text-anchor="middle">A</text>
    <text class="ln"    x="78"  y="188">L142</text>
    <text class="body"  x="148" y="188">曰</text>
    <text class="arrow" x="186" y="188">→</text>
    <text class="body"  x="216" y="188" fill="#7ee787">日</text>
    <text class="note"  x="640" y="188">字形混淆 · 高频 OCR 错</text>
  </g>

  <!-- ROW 2 -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.7s" dur="0.4s" fill="freeze"/>
    <rect class="tag-A" x="40" y="202" width="22" height="20" rx="3"/>
    <text class="tag-text" x="51" y="217" text-anchor="middle">A</text>
    <text class="ln"    x="78"  y="218">L207</text>
    <text class="body"  x="148" y="218">己丑</text>
    <text class="arrow" x="200" y="218">→</text>
    <text class="body"  x="230" y="218" fill="#7ee787">已丑</text>
    <text class="note"  x="640" y="218">己/已/巳 三字混扫 · 比对原图</text>
  </g>

  <!-- ROW 3 -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.2s" dur="0.4s" fill="freeze"/>
    <rect class="tag-B" x="40" y="232" width="22" height="20" rx="3"/>
    <text class="tag-text" x="51" y="247" text-anchor="middle">B</text>
    <text class="ln"    x="78"  y="248">L389</text>
    <text class="body"  x="148" y="248">":"</text>
    <text class="arrow" x="186" y="248">→</text>
    <text class="body"  x="216" y="248" fill="#7ee787">"："</text>
    <text class="note"  x="640" y="248">半角→全角 · GB/T 7714 标点规范</text>
  </g>

  <!-- ROW 4 -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.7s" dur="0.4s" fill="freeze"/>
    <rect class="tag-B" x="40" y="262" width="22" height="20" rx="3"/>
    <text class="tag-text" x="51" y="277" text-anchor="middle">B</text>
    <text class="ln"    x="78"  y="278">L412</text>
    <text class="body"  x="148" y="278">[1]</text>
    <text class="arrow" x="186" y="278">→</text>
    <text class="body"  x="216" y="278" fill="#7ee787">[1]脚注还原</text>
    <text class="note"  x="640" y="278">$1$ 公式包裹脚注 · 系统性还原</text>
  </g>

  <!-- ROW 5 -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="2.2s" dur="0.4s" fill="freeze"/>
    <rect class="tag-C" x="40" y="292" width="22" height="20" rx="3"/>
    <text class="tag-text" x="51" y="307" text-anchor="middle">C</text>
    <text class="ln"    x="78"  y="308">L514</text>
    <text class="body"  x="148" y="308">光绪丙午</text>
    <text class="arrow" x="234" y="308">?</text>
    <text class="note"  x="640" y="308">干支与公历差一月 · 待核书</text>
  </g>

  <!-- ROW 6 -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="2.7s" dur="0.4s" fill="freeze"/>
    <rect class="tag-C" x="40" y="322" width="22" height="20" rx="3"/>
    <text class="tag-text" x="51" y="337" text-anchor="middle">C</text>
    <text class="ln"    x="78"  y="338">L661</text>
    <text class="body"  x="148" y="338">總理衙門</text>
    <text class="arrow" x="234" y="338">?</text>
    <text class="note"  x="640" y="338">繁简夹用 · 引文原貌优先保留</text>
  </g>

  <!-- divider -->
  <line x1="40" y1="376" x2="1160" y2="376" stroke="#21262d"/>

  <!-- summary -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="3.4s" dur="0.5s" fill="freeze"/>
    <text class="summary" x="40" y="412">42 标注 ·</text>
    <text class="summary summary-A" x="158" y="412">A 21</text>
    <text class="meta" x="206" y="412">OCR 错 · 建议直接改</text>
    <text class="summary summary-B" x="430" y="412">B 14</text>
    <text class="meta" x="478" y="412">规范 · 按刊物判断</text>
    <text class="summary summary-C" x="678" y="412">C 7</text>
    <text class="meta" x="718" y="412">存疑 · 需核原书</text>
  </g>

  <!-- footer -->
  <line x1="0" y1="438" x2="1200" y2="438" stroke="#21262d"/>
  <text class="meta" x="40"   y="464">.ocr/raw.review.md</text>
  <text class="meta" x="220"  y="464">page-grounded · 五步 checklist 完整跑过</text>
  <text class="meta" x="1160" y="464" text-anchor="end">→ apply_review.py · final.md</text>
</svg>
