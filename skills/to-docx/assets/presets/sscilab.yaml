# sscilab preset — 中国社科院期刊标准格式.
#
# Wider margins than humanities, classical 1.5 line spacing, no letter
# spacing. Keep this for formal submissions where the editor expects a
# conservative look.

name: sscilab
description: 中国社科院 / 严格规范投稿格式

page:
  margin_top: 2.54
  margin_bottom: 2.54
  margin_left: 3.18
  margin_right: 3.18

body:
  font: "Source Han Serif SC"
  size: 12
  line_spacing: 1.5
  first_line_indent_chars: 2
  character_spacing_pt: 0.0

heading:
  font: "SimHei"
  sizes:
    1: 18
    2: 16
    3: 14
    4: 12

image:
  max_width_cm: 14
  max_file_kb: 800
